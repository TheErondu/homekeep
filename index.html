<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homekeep — Visitors, security and dues. One app.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300,0..1,0&display=block" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.16/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #081210; color: #e9f1ec; font-family: 'Hanken Grotesk', sans-serif; }
  html { scroll-behavior: smooth; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, textarea, button { font-family: inherit; }
  @keyframes hkfloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes hkpulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,93,93,.45)} 50%{box-shadow:0 0 0 10px rgba(255,93,93,0)} }
  @keyframes hktoast { from{opacity:0;transform:translate(-50%,12px)} to{opacity:1;transform:translate(-50%,0)} }
  @keyframes hkglow { 0%,100%{opacity:.55} 50%{opacity:.9} }
  @keyframes hkslide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .hkpulse { animation: hkpulse 2.4s ease-in-out infinite; }
  .hkslide { animation: hkslide .3s ease; }
  .hktoast { animation: hktoast .25s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const G = '#34e08a';
const CARD = '#13211a';
const INPUT = '#0c1813';
const DIM = '#8da093';
const MUTED = '#9cb3a6';
const BORDER = 'rgba(255,255,255,.07)';

const Icon = ({ name, size = 22, color, fill = 0, style = {} }) => (
  <span style={{ fontFamily:"'Material Symbols Rounded'", fontSize: size, color, fontVariationSettings:`'FILL' ${fill}`, lineHeight:1, userSelect:'none', flexShrink:0, ...style }}>{name}</span>
);

// ─── PHONE DEMO (Manager mini-app) ───────────────────────────────────────────

function PhoneDemo() {
  const [screen, setScreen] = useState('home');
  const [inviteName, setInviteNameState] = useState('');
  const [inviteType, setInviteType] = useState('single');
  const [invites, setInvites] = useState([
    { name: 'Adebayo Group', type: 'multi', code: 'PK-7QX2', when: 'Today, 2:30 PM' },
    { name: 'DHL Courier', type: 'single', code: 'PK-4MN8', when: 'Today, 11:05 AM' },
  ]);
  const [gate, setGate] = useState([
    { id: 1, name: 'Chinedu Okafor', host: 'Block C · Flat 4', time: 'just now' },
    { id: 2, name: 'Glovo Rider', host: 'Block A · Flat 12', time: '2 min ago' },
  ]);
  const [balance, setBalance] = useState(145000);
  const [paid, setPaid] = useState(false);
  const [complaints, setComplaints] = useState([
    { id: 1, title: 'Street light out on Block B walkway', status: 'In progress', time: 'Yesterday' },
    { id: 2, title: 'Refuse not collected on Crescent 2', status: 'Resolved', time: '2 days ago' },
  ]);
  const [complaintText, setComplaintText] = useState('');
  const [panicOpen, setPanicOpen] = useState(false);
  const [panicState, setPanicState] = useState('idle');
  const [panicPct, setPanicPct] = useState(0);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const panicTimer = useRef(null);

  const go = s => { setScreen(s); setPanicOpen(false); };

  const flash = useCallback(msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2400);
  }, []);

  useEffect(() => () => { clearInterval(panicTimer.current); clearTimeout(toastTimer.current); }, []);

  const createInvite = () => {
    const name = inviteName.trim() || 'Guest';
    const code = 'PK-' + Math.random().toString(36).slice(2, 6).toUpperCase();
    setInvites(prev => [{ name, type: inviteType, code, when: 'Just now' }, ...prev]);
    setInviteNameState('');
    flash('Invitation ' + code + ' created');
  };

  const allow = id => {
    setGate(prev => prev.filter(g => g.id !== id));
    flash('Visitor allowed in');
  };
  const deny = id => {
    setGate(prev => prev.filter(g => g.id !== id));
    flash('Visitor denied');
  };

  const payDues = () => { setBalance(0); setPaid(true); flash('Dues paid · ₦145,000'); };

  const addComplaint = () => {
    const t = complaintText.trim();
    if (!t) return;
    setComplaints(prev => [{ id: Date.now(), title: t, status: 'Open', time: 'Just now' }, ...prev]);
    setComplaintText('');
    flash('Complaint submitted');
  };

  const startPanic = () => {
    if (panicState !== 'idle') return;
    setPanicState('arming');
    panicTimer.current = setInterval(() => {
      setPanicPct(prev => {
        const p = Math.min(100, prev + 5);
        if (p >= 100) { clearInterval(panicTimer.current); setPanicState('sent'); }
        return p;
      });
    }, 32);
  };
  const cancelPanic = () => { if (panicState === 'arming') { clearInterval(panicTimer.current); setPanicState('idle'); setPanicPct(0); } };
  const closePanic = () => { clearInterval(panicTimer.current); setPanicOpen(false); setPanicState('idle'); setPanicPct(0); };

  const nav = [
    { key: 'home', label: 'Home', icon: 'home' },
    { key: 'visitors', label: 'Visitors', icon: 'group' },
    { key: 'gate', label: 'Gate', icon: 'shield' },
    { key: 'dues', label: 'Dues', icon: 'account_balance_wallet' },
    { key: 'issues', label: 'Issues', icon: 'forum' },
  ];

  const stStatus = s => s === 'Resolved' ? { color: G, bg: 'rgba(52,224,138,.12)' }
    : s === 'In progress' ? { color: '#ffb84d', bg: 'rgba(255,184,77,.12)' }
    : { color: '#7fb4ff', bg: 'rgba(127,180,255,.12)' };

  const seg = on => on
    ? { border: 'rgba(52,224,138,.4)', bg: 'rgba(52,224,138,.14)', color: G }
    : { border: 'rgba(255,255,255,.1)', bg: 'transparent', color: MUTED };
  const s1 = seg(inviteType === 'single'), s2 = seg(inviteType === 'multi');

  const panicSent = panicState === 'sent';
  const gateLog = [
    { name: 'Mrs. Bello', dir: 'in', time: '1:12 PM' },
    { name: 'Uche (Flat 9)', dir: 'out', time: '12:55 PM' },
    { name: 'Water vendor', dir: 'in', time: '12:30 PM' },
  ];

  return (
    <div style={{ position:'relative', width:318, height:646, background:'#05100b', border:'2px solid #1e2c24', borderRadius:48, padding:11, boxShadow:'0 40px 90px -30px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.03)', animation:'hkfloat 7s ease-in-out infinite' }}>
      <div style={{ position:'relative', width:'100%', height:'100%', background:'#0a1611', borderRadius:38, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        {/* Status bar */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 22px 8px', fontSize:13, fontWeight:600, color:'#cfe0d6', flexShrink:0 }}>
          <span>9:41</span>
          <div style={{ display:'flex', gap:5 }}>
            <Icon name="signal_cellular_alt" size={16} />
            <Icon name="wifi" size={16} />
            <Icon name="battery_full" size={16} />
          </div>
        </div>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 18px 12px', flexShrink:0 }}>
          <div>
            <div style={{ fontSize:12, color:'#7f968a', fontWeight:500 }}>Parkview Estate</div>
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600 }}>Good evening, Manager</div>
          </div>
          <div style={{ position:'relative', width:38, height:38, borderRadius:'50%', background:'#16271e', display:'grid', placeItems:'center', border:`1px solid ${BORDER}` }}>
            <Icon name="notifications" size={21} color="#aebcb3" />
            <span style={{ position:'absolute', top:7, right:8, width:7, height:7, borderRadius:'50%', background:'#ff5d5d' }} />
          </div>
        </div>

        {/* Screen content */}
        <div style={{ flex:1, overflowY:'auto', padding:'4px 18px 96px' }}>

          {/* HOME */}
          {screen === 'home' && <div className="hkslide">
            <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.2)', borderRadius:18, padding:16, marginBottom:16 }}>
              <div style={{ fontSize:12, color:'#8fd9b3', fontWeight:500, marginBottom:12 }}>TODAY AT A GLANCE</div>
              <div style={{ display:'flex', justifyContent:'space-between', textAlign:'center' }}>
                <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:24, fontWeight:700 }}>14</div><div style={{ fontSize:11, color:MUTED }}>Visitors</div></div>
                <div style={{ width:1, background:'rgba(255,255,255,.1)' }} />
                <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:24, fontWeight:700, color:G }}>{gate.length}</div><div style={{ fontSize:11, color:MUTED }}>At gate</div></div>
                <div style={{ width:1, background:'rgba(255,255,255,.1)' }} />
                <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:24, fontWeight:700, color:'#ffb84d' }}>{complaints.filter(c=>c.status!=='Resolved').length}</div><div style={{ fontSize:11, color:MUTED }}>Open issues</div></div>
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:18 }}>
              {[
                { icon:'qr_code_2', label:'New invite', onClick:()=>go('visitors'), danger:false },
                { icon:'account_balance_wallet', label:'Pay dues', onClick:()=>go('dues'), danger:false },
                { icon:'forum', label:'Log issue', onClick:()=>go('issues'), danger:false },
                { icon:'sos', label:'Panic alert', onClick:()=>setPanicOpen(true), danger:true },
              ].map(item => (
                <button key={item.label} onClick={item.onClick} className={item.danger ? 'hkpulse' : ''} style={{ textAlign:'left', background: item.danger ? '#2a1414' : CARD, border:`1px solid ${item.danger ? 'rgba(255,93,93,.3)' : BORDER}`, borderRadius:14, padding:13, cursor:'pointer', color: item.danger ? '#ffd5d5' : '#e9f1ec' }}>
                  <Icon name={item.icon} size={24} color={item.danger ? '#ff5d5d' : G} />
                  <div style={{ fontSize:13, fontWeight:600, marginTop:8 }}>{item.label}</div>
                </button>
              ))}
            </div>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:9 }}>
              <span style={{ fontSize:13, fontWeight:600 }}>Live at the gate</span>
              <span onClick={()=>go('gate')} style={{ fontSize:12, color:G, cursor:'pointer' }}>View all</span>
            </div>
            {gate.length > 0 ? (
              <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:13, marginBottom:18 }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:11 }}>
                  <div style={{ width:34, height:34, borderRadius:10, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="person" size={19} color={MUTED} /></div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600 }}>{gate[0].name}</div>
                    <div style={{ fontSize:11, color:DIM }}>{gate[0].host} · {gate[0].time}</div>
                  </div>
                  <span style={{ fontSize:10, fontWeight:600, color:'#ffb84d', background:'rgba(255,184,77,.12)', padding:'3px 7px', borderRadius:6 }}>PENDING</span>
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={()=>allow(gate[0].id)} style={{ flex:1, background:G, color:'#06140d', border:'none', borderRadius:10, padding:9, fontWeight:600, fontSize:13, cursor:'pointer' }}>Allow in</button>
                  <button onClick={()=>deny(gate[0].id)} style={{ flex:1, background:'transparent', color:'#ff8a8a', border:'1px solid rgba(255,93,93,.3)', borderRadius:10, padding:9, fontWeight:600, fontSize:13, cursor:'pointer' }}>Deny</button>
                </div>
              </div>
            ) : (
              <div style={{ background:CARD, border:'1px dashed rgba(255,255,255,.1)', borderRadius:14, padding:18, textAlign:'center', marginBottom:18, color:DIM, fontSize:13 }}>Gate is clear. No one waiting.</div>
            )}
            <div style={{ fontSize:13, fontWeight:600, marginBottom:9 }}>Recent activity</div>
            {[{ icon:'login', text:'Mrs. Bello entered', sub:'Main gate · 1:12 PM' }, { icon:'payments', text:'Dues paid by Flat 12', sub:'₦45,000 · 12:40 PM' }, { icon:'qr_code_2', text:'Invite code used', sub:'DHL Courier · 11:05 AM' }].map((a,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:11, padding:'9px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
                <div style={{ width:32, height:32, borderRadius:9, background:'#16271e', display:'grid', placeItems:'center' }}><Icon name={a.icon} size={18} color="#7ff0b6" /></div>
                <div style={{ flex:1 }}><div style={{ fontSize:13 }}>{a.text}</div><div style={{ fontSize:11, color:DIM }}>{a.sub}</div></div>
              </div>
            ))}
          </div>}

          {/* VISITORS */}
          {screen === 'visitors' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600, margin:'2px 0 14px' }}>Invitations</div>
            <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:16, padding:14, marginBottom:18 }}>
              <div style={{ fontSize:12, color:DIM, marginBottom:8 }}>Guest or vendor name</div>
              <input value={inviteName} onChange={e=>setInviteNameState(e.target.value)} placeholder="e.g. Adebayo Group" style={{ width:'100%', background:INPUT, border:'1px solid rgba(255,255,255,.1)', borderRadius:10, padding:11, color:'#e9f1ec', fontSize:14, outline:'none', marginBottom:12 }} />
              <div style={{ display:'flex', gap:8, marginBottom:14 }}>
                {[{l:'Single use',s:s1,f:()=>setInviteType('single')},{l:'Multi use',s:s2,f:()=>setInviteType('multi')}].map(item => (
                  <button key={item.l} onClick={item.f} style={{ flex:1, padding:9, borderRadius:9, cursor:'pointer', fontSize:12, fontWeight:600, border:`1px solid ${item.s.border}`, background:item.s.bg, color:item.s.color }}>{item.l}</button>
                ))}
              </div>
              <button onClick={createInvite} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:11, padding:12, fontWeight:600, fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
                <Icon name="qr_code_2" size={19} color="#06140d" /> Generate code
              </button>
            </div>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:9 }}>Active invitations</div>
            {invites.map((iv,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:11, background:CARD, border:'1px solid rgba(255,255,255,.06)', borderRadius:13, padding:12, marginBottom:9 }}>
                <div style={{ width:36, height:36, borderRadius:10, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="confirmation_number" size={19} color="#7ff0b6" /></div>
                <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{iv.name}</div><div style={{ fontSize:11, color:DIM }}>{iv.type === 'multi' ? 'Multi-use' : 'Single-use'} · {iv.when}</div></div>
                <span style={{ fontFamily:"'Space Grotesk'", fontSize:13, fontWeight:600, color:G, letterSpacing:'.04em' }}>{iv.code}</span>
              </div>
            ))}
          </div>}

          {/* GATE */}
          {screen === 'gate' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600, margin:'2px 0 4px' }}>Gate control</div>
            <div style={{ fontSize:12, color:DIM, marginBottom:14, display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ width:7, height:7, borderRadius:'50%', background:G, display:'inline-block' }} />Main Entrance · live
            </div>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:9 }}>Waiting for approval</div>
            {gate.length > 0 ? gate.map(g => (
              <div key={g.id} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:13, marginBottom:10 }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:11 }}>
                  <div style={{ width:34, height:34, borderRadius:10, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="person" size={19} color={MUTED} /></div>
                  <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{g.name}</div><div style={{ fontSize:11, color:DIM }}>{g.host} · {g.time}</div></div>
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <button onClick={()=>allow(g.id)} style={{ flex:1, background:G, color:'#06140d', border:'none', borderRadius:10, padding:9, fontWeight:600, fontSize:13, cursor:'pointer' }}>Allow in</button>
                  <button onClick={()=>deny(g.id)} style={{ flex:1, background:'transparent', color:'#ff8a8a', border:'1px solid rgba(255,93,93,.3)', borderRadius:10, padding:9, fontWeight:600, fontSize:13, cursor:'pointer' }}>Deny</button>
                </div>
              </div>
            )) : (
              <div style={{ background:CARD, border:'1px dashed rgba(255,255,255,.1)', borderRadius:14, padding:18, textAlign:'center', marginBottom:8, color:DIM, fontSize:13 }}>All clear. No one waiting at the gate.</div>
            )}
            <div style={{ fontSize:13, fontWeight:600, margin:'16px 0 9px' }}>Access log</div>
            {gateLog.map((l,i) => {
              const isIn = l.dir === 'in';
              return (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:11, padding:'9px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
                  <div style={{ width:30, height:30, borderRadius:9, background: isIn ? '#16271e' : '#1a2520', display:'grid', placeItems:'center' }}>
                    <Icon name={isIn ? 'login' : 'logout'} size={17} color={isIn ? '#7ff0b6' : MUTED} />
                  </div>
                  <div style={{ flex:1 }}><div style={{ fontSize:13 }}>{l.name}</div><div style={{ fontSize:11, color:DIM }}>{isIn ? 'Entered' : 'Exited'} · Main gate</div></div>
                  <span style={{ fontSize:11, color:DIM }}>{l.time}</span>
                </div>
              );
            })}
          </div>}

          {/* DUES */}
          {screen === 'dues' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600, margin:'2px 0 14px' }}>Facility dues</div>
            {!paid ? (
              <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.2)', borderRadius:18, padding:18, marginBottom:16 }}>
                <div style={{ fontSize:12, color:'#8fd9b3', marginBottom:6 }}>OUTSTANDING BALANCE</div>
                <div style={{ fontFamily:"'Space Grotesk'", fontSize:34, fontWeight:700 }}>₦{balance.toLocaleString()}</div>
                <div style={{ fontSize:12, color:MUTED, marginBottom:16 }}>Due 30 June 2026</div>
                <button onClick={payDues} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:11, padding:13, fontWeight:600, fontSize:14, cursor:'pointer' }}>Pay now</button>
              </div>
            ) : (
              <div style={{ background:'#123a28', border:'1px solid rgba(52,224,138,.3)', borderRadius:18, padding:'24px 18px', marginBottom:16, textAlign:'center' }}>
                <div style={{ width:54, height:54, borderRadius:'50%', background:G, display:'grid', placeItems:'center', margin:'0 auto 12px' }}><Icon name="check" size={30} color="#06140d" /></div>
                <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600 }}>Dues fully paid</div>
                <div style={{ fontSize:12, color:MUTED, marginTop:4 }}>Receipt sent to your email</div>
              </div>
            )}
            <div style={{ fontSize:13, fontWeight:600, marginBottom:9 }}>Breakdown</div>
            {[['Security levy','₦60,000'],['Waste management','₦25,000'],['Estate maintenance','₦45,000'],['Generator diesel','₦15,000']].map(([label,amt],i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
                <span style={{ fontSize:13, color:'#cfe0d6' }}>{label}</span>
                <span style={{ fontSize:13, fontWeight:600 }}>{amt}</span>
              </div>
            ))}
          </div>}

          {/* ISSUES */}
          {screen === 'issues' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600, margin:'2px 0 14px' }}>Complaints</div>
            <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:16, padding:14, marginBottom:18 }}>
              <div style={{ fontSize:12, color:DIM, marginBottom:8 }}>Describe the issue</div>
              <textarea value={complaintText} onChange={e=>setComplaintText(e.target.value)} placeholder="e.g. Street light out on Block B walkway" style={{ width:'100%', height:74, resize:'none', background:INPUT, border:'1px solid rgba(255,255,255,.1)', borderRadius:10, padding:11, color:'#e9f1ec', fontSize:14, outline:'none', marginBottom:12 }} />
              <button onClick={addComplaint} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:11, padding:12, fontWeight:600, fontSize:14, cursor:'pointer' }}>Submit complaint</button>
            </div>
            {complaints.map(c => {
              const st = stStatus(c.status);
              return (
                <div key={c.id} style={{ background:CARD, border:'1px solid rgba(255,255,255,.06)', borderRadius:13, padding:13, marginBottom:9 }}>
                  <div style={{ display:'flex', alignItems:'start', justifyContent:'space-between', gap:10 }}>
                    <div style={{ fontSize:13, fontWeight:500, flex:1 }}>{c.title}</div>
                    <span style={{ fontSize:10, fontWeight:600, color:st.color, background:st.bg, padding:'3px 8px', borderRadius:6, whiteSpace:'nowrap' }}>{c.status}</span>
                  </div>
                  <div style={{ fontSize:11, color:DIM, marginTop:6 }}>{c.time}</div>
                </div>
              );
            })}
          </div>}
        </div>

        {/* Bottom nav */}
        <div style={{ position:'absolute', bottom:0, left:0, right:0, display:'flex', justifyContent:'space-around', padding:'9px 8px 14px', background:'rgba(8,18,14,.92)', backdropFilter:'blur(10px)', borderTop:'1px solid rgba(255,255,255,.06)' }}>
          {nav.map(n => (
            <button key={n.key} onClick={()=>go(n.key)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:3, color: screen === n.key ? G : '#6f8579', fontFamily:'inherit', padding:'2px 6px', flex:1 }}>
              <Icon name={n.icon} size={23} fill={screen === n.key ? 1 : 0} />
              <span style={{ fontSize:10, fontWeight:500 }}>{n.label}</span>
            </button>
          ))}
        </div>

        {/* Panic overlay */}
        {panicOpen && (
          <div style={{ position:'absolute', inset:0, background:'rgba(6,12,9,.92)', backdropFilter:'blur(6px)', zIndex:20, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, textAlign:'center' }}>
            <button onClick={closePanic} style={{ position:'absolute', top:16, right:16, background:'#16271e', border:'1px solid rgba(255,255,255,.1)', width:34, height:34, borderRadius:'50%', cursor:'pointer', color:'#aebcb3', display:'grid', placeItems:'center' }}>
              <Icon name="close" size={20} />
            </button>
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:21, fontWeight:600, marginBottom:6 }}>{panicSent ? 'Security alerted' : 'Emergency alert'}</div>
            <div style={{ fontSize:13, color:'#aebcb3', marginBottom:30, maxWidth:220 }}>{panicSent ? 'Officers have been notified and are on their way.' : 'Press and hold to alert estate security.'}</div>
            <div
              onMouseDown={startPanic} onMouseUp={cancelPanic} onMouseLeave={cancelPanic}
              onTouchStart={startPanic} onTouchEnd={cancelPanic}
              style={{ width:188, height:188, borderRadius:'50%', cursor: panicSent ? 'default' : 'pointer', userSelect:'none', background:`conic-gradient(${panicSent ? G : '#ff5d5d'} ${panicPct * 3.6}deg, rgba(255,93,93,.15) 0deg)`, display:'grid', placeItems:'center' }}
            >
              <div style={{ width:152, height:152, borderRadius:'50%', background: panicSent ? '#10271b' : '#2a1414', border:`1px solid ${panicSent ? 'rgba(52,224,138,.45)' : 'rgba(255,93,93,.4)'}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:7 }}>
                <Icon name={panicSent ? 'check' : 'sos'} size={48} color={panicSent ? G : '#ff5d5d'} />
                <span style={{ fontSize:13, fontWeight:600, color: panicSent ? G : '#ff9a9a' }}>{panicSent ? 'Alert sent' : (panicPct > 0 ? 'Hold…' : 'Hold')}</span>
              </div>
            </div>
          </div>
        )}

        {/* Toast */}
        {toast && (
          <div className="hktoast" style={{ position:'absolute', bottom:84, left:'50%', transform:'translateX(-50%)', background:'#1d3327', border:'1px solid rgba(52,224,138,.3)', color:'#cdebd9', fontSize:13, fontWeight:500, padding:'10px 16px', borderRadius:11, whiteSpace:'nowrap', zIndex:25, display:'flex', alignItems:'center', gap:8 }}>
            <Icon name="check_circle" size={18} color={G} />{toast}
          </div>
        )}
      </div>
    </div>
  );
}

function Waitlist() {

              <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&join()} placeholder="Enter your email address" style={{ flex:1, background:'rgba(0,0,0,.25)', border:'1px solid rgba(255,255,255,.15)', borderRadius:12, padding:14, color:'#fff', fontSize:15, outline:'none' }} />
