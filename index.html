<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homekeep — Visitors, security and dues. One app.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300,0..1,0&display=block" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.16/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #081210; color: #e9f1ec; font-family: 'Hanken Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, textarea, button { font-family: inherit; }

  /* ── Animations ── */
  @keyframes hkfloat  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes hkpulse  { 0%,100%{box-shadow:0 0 0 0 rgba(255,93,93,.45)} 50%{box-shadow:0 0 0 10px rgba(255,93,93,0)} }
  @keyframes hktoast  { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
  @keyframes hkglow   { 0%,100%{opacity:.5} 50%{opacity:.85} }
  @keyframes hkslide  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .hkpulse { animation: hkpulse 2.4s ease-in-out infinite; }
  .hkslide { animation: hkslide .3s ease; }
  .hktoast { animation: hktoast .25s ease; }

  /* ── Layout helpers ── */
  .wrap     { max-width: 1180px; margin: 0 auto; padding: 0 28px; }
  .sec-pad  { padding-top: 80px; padding-bottom: 40px; }
  .sec-tag  { font-size: 13px; font-weight: 600; color: #34e08a; letter-spacing: .08em; margin-bottom: 10px; }

  /* ── Hero ── */
  .hero-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 48px; align-items: center; }
  .hero-h1   { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(32px, 5vw, 56px); line-height: 1.05; letter-spacing: -.02em; margin: 0 0 18px; }
  .hero-phone { position: relative; display: flex; justify-content: center; }
  .hero-phone-inner { animation: hkfloat 7s ease-in-out infinite; }
  .store-badges { display: flex; gap: 14px; flex-wrap: wrap; }

  /* ── Nav ── */
  .nav-links { display: flex; align-items: center; gap: 28px; font-size: 15px; color: #aebcb3; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; text-align: center; }

  /* ── Features ── */
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }

  /* ── Why us ── */
  .why-grid { display: grid; grid-template-columns: .8fr 1.2fr; gap: 48px; align-items: center; }

  /* ── Contact ── */
  .contact-grid { display: grid; grid-template-columns: .9fr 1.1fr; gap: 48px; }
  .contact-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  /* ── Footer ── */
  .footer-inner  { display: flex; justify-content: space-between; align-items: start; gap: 40px; flex-wrap: wrap; }
  .footer-badges { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }

  /* ── Tablet ── */
  @media (max-width: 900px) {
    .hero-grid      { grid-template-columns: 1fr; gap: 0; }
    .hero-phone     { order: -1; margin-bottom: 32px; }
    .hero-phone-inner { transform: scale(0.78); transform-origin: center top; }
    .stats-grid     { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .features-grid  { grid-template-columns: repeat(2, 1fr); }
    .why-grid       { grid-template-columns: 1fr; gap: 28px; }
    .contact-grid   { grid-template-columns: 1fr; gap: 28px; }
    .wrap           { padding: 0 20px; }
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .nav-links      { display: none; }
    .features-grid  { grid-template-columns: 1fr; }
    .stats-grid     { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .hero-phone-inner { transform: scale(0.68); transform-origin: center top; }
    .store-badges   { flex-direction: column; gap: 10px; }
    .footer-inner   { flex-direction: column; gap: 24px; }
    .footer-badges  { flex-direction: column; align-items: flex-start; }
    .contact-form-grid { grid-template-columns: 1fr; }
    .sec-pad        { padding-top: 52px; }
    .waitlist-row   { flex-direction: column; }
    .waitlist-row input  { border-radius: 12px !important; }
    .waitlist-row button { border-radius: 12px !important; width: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const G = '#34e08a';
const CARD = '#13211a';
const INPUT = '#0c1813';
const DIM = '#8da093';
const MUTED = '#9cb3a6';
const BORDER = 'rgba(255,255,255,.07)';

const Icon = ({ name, size=22, color, fill=0, style={} }) => (
  <span style={{ fontFamily:"'Material Symbols Rounded'", fontSize:size, color, fontVariationSettings:`'FILL' ${fill}`, lineHeight:1, userSelect:'none', flexShrink:0, ...style }}>{name}</span>
);

// ─── PHONE DEMO ───────────────────────────────────────────────────────────────

function PhoneDemo() {
  const [screen, setScreen] = useState('home');
  const [inviteName, setInviteName] = useState('');
  const [inviteType, setInviteType] = useState('single');
  const [invites, setInvites] = useState([
    { name:'Adebayo Group', type:'multi', code:'PK-7QX2', when:'Today, 2:30 PM' },
    { name:'DHL Courier', type:'single', code:'PK-4MN8', when:'Today, 11:05 AM' },
  ]);
  const [gate, setGate] = useState([
    { id:1, name:'Chinedu Okafor', host:'Block C · Flat 4', time:'just now' },
    { id:2, name:'Glovo Rider', host:'Block A · Flat 12', time:'2 min ago' },
  ]);
  const [paid, setPaid] = useState(false);
  const [complaints, setComplaints] = useState([
    { id:1, title:'Street light out on Block B walkway', status:'In progress', time:'Yesterday' },
    { id:2, title:'Refuse not collected on Crescent 2', status:'Resolved', time:'2 days ago' },
  ]);
  const [complaintText, setComplaintText] = useState('');
  const [panicOpen, setPanicOpen] = useState(false);
  const [panicState, setPanicState] = useState('idle');
  const [panicPct, setPanicPct] = useState(0);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const panicTimer = useRef(null);

  const go = s => { setScreen(s); setPanicOpen(false); };
  const flash = useCallback(msg => {
    setToast(msg); clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2400);
  }, []);
  useEffect(() => () => { clearInterval(panicTimer.current); clearTimeout(toastTimer.current); }, []);

  const createInvite = () => {
    const name = inviteName.trim() || 'Guest';
    const code = 'PK-' + Math.random().toString(36).slice(2,6).toUpperCase();
    setInvites(p => [{ name, type:inviteType, code, when:'Just now' }, ...p]);
    setInviteName(''); flash('Invite ' + code + ' created');
  };
  const allow = id => { setGate(p => p.filter(g=>g.id!==id)); flash('Visitor allowed in'); };
  const deny  = id => { setGate(p => p.filter(g=>g.id!==id)); flash('Visitor denied'); };
  const payDues = () => { setPaid(true); flash('Dues paid · ₦145,000'); };
  const addComplaint = () => {
    const t = complaintText.trim(); if (!t) return;
    setComplaints(p => [{ id:Date.now(), title:t, status:'Open', time:'Just now' }, ...p]);
    setComplaintText(''); flash('Complaint submitted');
  };
  const startPanic = () => {
    if (panicState !== 'idle') return;
    setPanicState('arming');
    panicTimer.current = setInterval(() => setPanicPct(p => {
      const n = Math.min(100, p+5);
      if (n >= 100) { clearInterval(panicTimer.current); setPanicState('sent'); }
      return n;
    }), 32);
  };
  const cancelPanic = () => { if (panicState==='arming') { clearInterval(panicTimer.current); setPanicState('idle'); setPanicPct(0); } };
  const closePanic  = () => { clearInterval(panicTimer.current); setPanicOpen(false); setPanicState('idle'); setPanicPct(0); };

  const nav = [
    { key:'home', icon:'home' }, { key:'visitors', icon:'group' },
    { key:'gate', icon:'shield' }, { key:'dues', icon:'account_balance_wallet' }, { key:'issues', icon:'forum' },
  ];
  const stStatus = s => s==='Resolved' ? { c:G, bg:'rgba(52,224,138,.12)' } : s==='In progress' ? { c:'#ffb84d', bg:'rgba(255,184,77,.12)' } : { c:'#7fb4ff', bg:'rgba(127,180,255,.12)' };
  const seg = on => on ? { border:'rgba(52,224,138,.4)', bg:'rgba(52,224,138,.14)', color:G } : { border:'rgba(255,255,255,.1)', bg:'transparent', color:MUTED };
  const s1 = seg(inviteType==='single'), s2 = seg(inviteType==='multi');
  const panicSent = panicState==='sent';
  const gateLog = [{ name:'Mrs. Bello', dir:'in', t:'1:12 PM' }, { name:'Uche (Flat 9)', dir:'out', t:'12:55 PM' }, { name:'Water vendor', dir:'in', t:'12:30 PM' }];

  const phoneStyle = { position:'relative', width:318, height:646, background:'#05100b', border:'2px solid #1e2c24', borderRadius:48, padding:11, boxShadow:'0 40px 80px -30px rgba(0,0,0,.75), inset 0 0 0 1px rgba(255,255,255,.03)' };
  const innerStyle = { position:'relative', width:'100%', height:'100%', background:'#0a1611', borderRadius:38, overflow:'hidden', display:'flex', flexDirection:'column' };

  return (
    <div style={phoneStyle}>
      <div style={innerStyle}>
        {/* Status bar */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 22px 6px', fontSize:13, fontWeight:600, color:'#cfe0d6', flexShrink:0 }}>
          <span>9:41</span>
          <div style={{ display:'flex', gap:5 }}><Icon name="signal_cellular_alt" size={16} /><Icon name="wifi" size={16} /><Icon name="battery_full" size={16} /></div>
        </div>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'4px 18px 10px', flexShrink:0 }}>
          <div>
            <div style={{ fontSize:12, color:'#7f968a', fontWeight:500 }}>Parkview Estate</div>
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600 }}>Good evening, Manager</div>
          </div>
          <div style={{ position:'relative', width:38, height:38, borderRadius:'50%', background:'#16271e', display:'grid', placeItems:'center', border:`1px solid ${BORDER}` }}>
            <Icon name="notifications" size={21} color="#aebcb3" />
            <span style={{ position:'absolute', top:7, right:8, width:7, height:7, borderRadius:'50%', background:'#ff5d5d' }} />
          </div>
        </div>

        {/* Content */}
        <div style={{ flex:1, overflowY:'auto', padding:'4px 18px 86px' }}>

          {screen==='home' && <div className="hkslide">
            <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.2)', borderRadius:18, padding:14, marginBottom:14 }}>
              <div style={{ fontSize:11, color:'#8fd9b3', fontWeight:500, marginBottom:10 }}>TODAY AT A GLANCE</div>
              <div style={{ display:'flex', justifyContent:'space-between', textAlign:'center' }}>
                <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:22, fontWeight:700 }}>14</div><div style={{ fontSize:10, color:MUTED }}>Visitors</div></div>
                <div style={{ width:1, background:'rgba(255,255,255,.1)' }} />
                <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:22, fontWeight:700, color:G }}>{gate.length}</div><div style={{ fontSize:10, color:MUTED }}>At gate</div></div>
                <div style={{ width:1, background:'rgba(255,255,255,.1)' }} />
                <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:22, fontWeight:700, color:'#ffb84d' }}>{complaints.filter(c=>c.status!=='Resolved').length}</div><div style={{ fontSize:10, color:MUTED }}>Open issues</div></div>
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:9, marginBottom:14 }}>
              {[{icon:'qr_code_2',label:'New invite',s:'visitors',d:false},{icon:'account_balance_wallet',label:'Pay dues',s:'dues',d:false},{icon:'forum',label:'Log issue',s:'issues',d:false},{icon:'sos',label:'Panic alert',s:'panic',d:true}].map(item => (
                <button key={item.label} onClick={()=>item.s==='panic'?setPanicOpen(true):go(item.s)} className={item.d?'hkpulse':''} style={{ textAlign:'left', background:item.d?'#2a1414':CARD, border:`1px solid ${item.d?'rgba(255,93,93,.3)':BORDER}`, borderRadius:13, padding:11, cursor:'pointer', color:item.d?'#ffd5d5':'#e9f1ec' }}>
                  <Icon name={item.icon} size={22} color={item.d?'#ff5d5d':G} />
                  <div style={{ fontSize:12, fontWeight:600, marginTop:7 }}>{item.label}</div>
                </button>
              ))}
            </div>
            {gate.length > 0 && (
              <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:13, padding:12, marginBottom:14 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:9 }}><span style={{ fontSize:12, fontWeight:600 }}>Live at gate</span><span onClick={()=>go('gate')} style={{ fontSize:11, color:G, cursor:'pointer' }}>View all</span></div>
                <div style={{ display:'flex', alignItems:'center', gap:9, marginBottom:9 }}>
                  <div style={{ width:32, height:32, borderRadius:9, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="person" size={18} color={MUTED} /></div>
                  <div style={{ flex:1 }}><div style={{ fontSize:12, fontWeight:600 }}>{gate[0].name}</div><div style={{ fontSize:10, color:DIM }}>{gate[0].host}</div></div>
                  <span style={{ fontSize:9, fontWeight:700, color:'#ffb84d', background:'rgba(255,184,77,.12)', padding:'2px 6px', borderRadius:5 }}>PENDING</span>
                </div>
                <div style={{ display:'flex', gap:7 }}>
                  <button onClick={()=>allow(gate[0].id)} style={{ flex:1, background:G, color:'#06140d', border:'none', borderRadius:9, padding:8, fontWeight:600, fontSize:12, cursor:'pointer' }}>Allow in</button>
                  <button onClick={()=>deny(gate[0].id)} style={{ flex:1, background:'transparent', color:'#ff8a8a', border:'1px solid rgba(255,93,93,.3)', borderRadius:9, padding:8, fontWeight:600, fontSize:12, cursor:'pointer' }}>Deny</button>
                </div>
              </div>
            )}
            <div style={{ fontSize:12, fontWeight:600, marginBottom:8 }}>Recent activity</div>
            {[{icon:'login',text:'Mrs. Bello entered',sub:'Main gate · 1:12 PM'},{icon:'payments',text:'Dues paid — Flat 12',sub:'₦45,000 · 12:40 PM'},{icon:'qr_code_2',text:'Invite code used',sub:'DHL Courier · 11:05 AM'}].map((a,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
                <div style={{ width:30, height:30, borderRadius:8, background:'#16271e', display:'grid', placeItems:'center' }}><Icon name={a.icon} size={16} color="#7ff0b6" /></div>
                <div style={{ flex:1 }}><div style={{ fontSize:12 }}>{a.text}</div><div style={{ fontSize:10, color:DIM }}>{a.sub}</div></div>
              </div>
            ))}
          </div>}

          {screen==='visitors' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600, margin:'2px 0 12px' }}>Invitations</div>
            <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:13, marginBottom:14 }}>
              <input value={inviteName} onChange={e=>setInviteName(e.target.value)} placeholder="Guest or vendor name" style={{ width:'100%', background:INPUT, border:'1px solid rgba(255,255,255,.1)', borderRadius:9, padding:10, color:'#e9f1ec', fontSize:13, outline:'none', marginBottom:10 }} />
              <div style={{ display:'flex', gap:7, marginBottom:12 }}>
                {[{l:'Single use',s:s1,f:'single'},{l:'Multi use',s:s2,f:'multi'}].map(sg => (
                  <button key={sg.f} onClick={()=>setInviteType(sg.f)} style={{ flex:1, padding:8, borderRadius:8, cursor:'pointer', fontSize:11, fontWeight:600, border:`1px solid ${sg.s.border}`, background:sg.s.bg, color:sg.s.color }}>{sg.l}</button>
                ))}
              </div>
              <button onClick={createInvite} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:10, padding:11, fontWeight:600, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                <Icon name="qr_code_2" size={17} color="#06140d" /> Generate code
              </button>
            </div>
            {invites.map((iv,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10, background:CARD, border:'1px solid rgba(255,255,255,.06)', borderRadius:12, padding:11, marginBottom:8 }}>
                <div style={{ width:34, height:34, borderRadius:9, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="confirmation_number" size={18} color="#7ff0b6" /></div>
                <div style={{ flex:1 }}><div style={{ fontSize:12, fontWeight:600 }}>{iv.name}</div><div style={{ fontSize:10, color:DIM }}>{iv.type==='multi'?'Multi-use':'Single-use'} · {iv.when}</div></div>
                <span style={{ fontFamily:"'Space Grotesk'", fontSize:12, fontWeight:700, color:G, letterSpacing:'.04em' }}>{iv.code}</span>
              </div>
            ))}
          </div>}

          {screen==='gate' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600, margin:'2px 0 4px' }}>Gate control</div>
            <div style={{ fontSize:11, color:DIM, marginBottom:12, display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:G, display:'inline-block' }} />Main Entrance · live
            </div>
            {gate.length > 0 ? gate.map(g => (
              <div key={g.id} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:13, padding:12, marginBottom:9 }}>
                <div style={{ display:'flex', alignItems:'center', gap:9, marginBottom:10 }}>
                  <div style={{ width:32, height:32, borderRadius:9, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="person" size={18} color={MUTED} /></div>
                  <div style={{ flex:1 }}><div style={{ fontSize:12, fontWeight:600 }}>{g.name}</div><div style={{ fontSize:10, color:DIM }}>{g.host} · {g.time}</div></div>
                </div>
                <div style={{ display:'flex', gap:7 }}>
                  <button onClick={()=>allow(g.id)} style={{ flex:1, background:G, color:'#06140d', border:'none', borderRadius:9, padding:8, fontWeight:600, fontSize:12, cursor:'pointer' }}>Allow in</button>
                  <button onClick={()=>deny(g.id)} style={{ flex:1, background:'transparent', color:'#ff8a8a', border:'1px solid rgba(255,93,93,.3)', borderRadius:9, padding:8, fontWeight:600, fontSize:12, cursor:'pointer' }}>Deny</button>
                </div>
              </div>
            )) : <div style={{ background:CARD, border:'1px dashed rgba(255,255,255,.1)', borderRadius:13, padding:16, textAlign:'center', color:DIM, fontSize:12 }}>Gate is clear.</div>}
            <div style={{ fontSize:12, fontWeight:600, margin:'14px 0 8px' }}>Access log</div>
            {gateLog.map((l,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
                <div style={{ width:28, height:28, borderRadius:8, background:l.dir==='in'?'#16271e':'#1a2520', display:'grid', placeItems:'center' }}><Icon name={l.dir==='in'?'login':'logout'} size={16} color={l.dir==='in'?'#7ff0b6':MUTED} /></div>
                <div style={{ flex:1 }}><div style={{ fontSize:12 }}>{l.name}</div><div style={{ fontSize:10, color:DIM }}>{l.dir==='in'?'Entered':'Exited'}</div></div>
                <span style={{ fontSize:10, color:DIM }}>{l.t}</span>
              </div>
            ))}
          </div>}

          {screen==='dues' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600, margin:'2px 0 12px' }}>Facility dues</div>
            {!paid ? (
              <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.2)', borderRadius:16, padding:16, marginBottom:14 }}>
                <div style={{ fontSize:11, color:'#8fd9b3', marginBottom:4 }}>OUTSTANDING BALANCE</div>
                <div style={{ fontFamily:"'Space Grotesk'", fontSize:32, fontWeight:700 }}>₦145,000</div>
                <div style={{ fontSize:11, color:MUTED, marginBottom:14 }}>Due 30 June 2026</div>
                <button onClick={payDues} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:10, padding:12, fontWeight:600, fontSize:13, cursor:'pointer' }}>Pay now</button>
              </div>
            ) : (
              <div style={{ background:'#123a28', border:'1px solid rgba(52,224,138,.3)', borderRadius:16, padding:'20px 16px', marginBottom:14, textAlign:'center' }}>
                <div style={{ width:48, height:48, borderRadius:'50%', background:G, display:'grid', placeItems:'center', margin:'0 auto 10px' }}><Icon name="check" size={26} color="#06140d" /></div>
                <div style={{ fontFamily:"'Space Grotesk'", fontSize:16, fontWeight:600 }}>Dues paid</div>
              </div>
            )}
            {[['Security levy','₦60,000'],['Waste management','₦25,000'],['Estate maintenance','₦45,000'],['Generator diesel','₦15,000']].map(([l,a],i) => (
              <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid rgba(255,255,255,.05)', fontSize:12 }}>
                <span style={{ color:'#cfe0d6' }}>{l}</span><span style={{ fontWeight:600 }}>{a}</span>
              </div>
            ))}
          </div>}

          {screen==='issues' && <div className="hkslide">
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:18, fontWeight:600, margin:'2px 0 12px' }}>Complaints</div>
            <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:14, padding:13, marginBottom:14 }}>
