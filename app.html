<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Homekeep — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300,0..1,0&display=block" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.12.16/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0a1611; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Hanken Grotesk', sans-serif; color: #e9f1ec; overflow: hidden; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, textarea, button, select { font-family: inherit; }

  /* Full-screen app shell */
  #root {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #030a06;
  }

  /* On desktop — centered app column, max 430px */
  .app-shell {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    height: 100dvh;
    background: #0a1611;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* On actual mobile — truly full bleed */
  @media (max-width: 480px) {
    #root { background: #0a1611; }
    .app-shell { max-width: 100%; border-radius: 0; }
  }

  /* Desktop: subtle side shadow to distinguish from bg */
  @media (min-width: 481px) {
    .app-shell {
      border-left: 1px solid rgba(255,255,255,.06);
      border-right: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 0 80px rgba(0,0,0,.6);
    }
  }

  /* Scrollable screen body */
  .screen-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    justify-content: space-around;
    padding: 10px 8px max(14px, env(safe-area-inset-bottom));
    background: rgba(8,18,14,.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,.07);
    flex-shrink: 0;
  }

  /* Animations */
  @keyframes hkslide  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes hkfadein { from{opacity:0} to{opacity:1} }
  @keyframes hkpulse  { 0%,100%{box-shadow:0 0 0 0 rgba(255,93,93,.5)} 50%{box-shadow:0 0 0 12px rgba(255,93,93,0)} }
  @keyframes hktoast  { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
  .slide   { animation: hkslide  .28s ease both; }
  .fadein  { animation: hkfadein .3s ease; }
  .toast   { animation: hktoast  .2s ease; }
  .ppulse  { animation: hkpulse  2s infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const G = '#34e08a';
const BG = '#0a1611';
const CARD = '#13211a';
const CARD2 = '#0f1c15';
const INPUT = '#0c1813';
const DIM = '#8da093';
const MUTED = '#9cb3a6';
const BORDER = 'rgba(255,255,255,.07)';
const RED = '#ff5d5d';

const Icon = ({ name, size=22, color, fill=0, style={} }) => (
  <span style={{ fontFamily:"'Material Symbols Rounded'", fontSize:size, color, fontVariationSettings:`'FILL' ${fill}`, lineHeight:1, userSelect:'none', flexShrink:0, display:'inline-flex', alignItems:'center', ...style }}>{name}</span>
);

const Badge = ({ text, color, bg }) => (
  <span style={{ fontSize:10, fontWeight:700, color, background:bg, padding:'3px 8px', borderRadius:6, letterSpacing:'.04em', whiteSpace:'nowrap' }}>{text}</span>
);

function useToast() {
  const [toast, setToast] = useState(null);
  const t = useRef(null);
  const flash = useCallback(msg => {
    setToast(msg); clearTimeout(t.current);
    t.current = setTimeout(() => setToast(null), 2600);
  }, []);
  useEffect(() => () => clearTimeout(t.current), []);
  return [toast, flash];
}

function ToastBar({ msg }) {
  if (!msg) return null;
  return (
    <div className="toast" style={{ position:'absolute', bottom:76, left:'50%', transform:'translateX(-50%)', background:'#1a3326', border:'1px solid rgba(52,224,138,.35)', color:'#cdebd9', fontSize:13, fontWeight:500, padding:'10px 16px', borderRadius:11, whiteSpace:'nowrap', zIndex:40, display:'flex', alignItems:'center', gap:8 }}>
      <Icon name="check_circle" size={18} color={G} />{msg}
    </div>
  );
}

function ScreenHeader({ title, sub, onBack, right }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, padding:'8px 18px 14px', flexShrink:0 }}>
      {onBack && <button onClick={onBack} style={{ background:'#16271e', border:`1px solid ${BORDER}`, width:36, height:36, borderRadius:'50%', cursor:'pointer', color:MUTED, display:'grid', placeItems:'center', flexShrink:0 }}>
        <Icon name="arrow_back" size={19} />
      </button>}
      <div style={{ flex:1 }}>
        <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600 }}>{title}</div>
        {sub && <div style={{ fontSize:12, color:DIM, marginTop:2 }}>{sub}</div>}
      </div>
      {right}
    </div>
  );
}

function EmptyState({ icon, text }) {
  return (
    <div style={{ textAlign:'center', padding:'48px 20px', color:DIM }}>
      <Icon name={icon} size={40} color="#1e3327" style={{ marginBottom:12 }} />
      <div style={{ fontSize:14 }}>{text}</div>
    </div>
  );
}

// ─── RESIDENT ─────────────────────────────────────────────────────────────────

function ResidentHome({ flash, setScreen, data }) {
  return (
    <div className="slide" style={{ padding:'0 18px 100px' }}>
      <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.18)', borderRadius:18, padding:16, marginBottom:16 }}>
        <div style={{ fontSize:12, color:'#8fd9b3', fontWeight:500, marginBottom:12 }}>PARKVIEW ESTATE · BLOCK C, FLAT 3</div>
        <div style={{ display:'flex', justifyContent:'space-between', textAlign:'center' }}>
          <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:26, fontWeight:700, color:G }}>{data.invites.length}</div><div style={{ fontSize:11, color:MUTED }}>Active invites</div></div>
          <div style={{ width:1, background:'rgba(255,255,255,.1)' }} />
          <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:26, fontWeight:700 }}>₦145,000</div><div style={{ fontSize:11, color:MUTED }}>Dues balance</div></div>
          <div style={{ width:1, background:'rgba(255,255,255,.1)' }} />
          <div><div style={{ fontFamily:"'Space Grotesk'", fontSize:26, fontWeight:700, color:'#ffb84d' }}>2</div><div style={{ fontSize:11, color:MUTED }}>Polls open</div></div>
        </div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:20 }}>
        {[{icon:'qr_code_2',label:'Invite guest',s:'guests'},{icon:'account_balance_wallet',label:'Pay dues',s:'dues'},{icon:'how_to_vote',label:'Polls',s:'community'},{icon:'sos',label:'Panic alert',s:'panic'}].map(item => (
          <button key={item.label} onClick={()=>setScreen(item.s)} className={item.s==='panic'?'ppulse':''} style={{ textAlign:'left', background:item.s==='panic'?'#2a1414':CARD, border:`1px solid ${item.s==='panic'?'rgba(255,93,93,.3)':BORDER}`, borderRadius:14, padding:14, cursor:'pointer', color:item.s==='panic'?'#ffd5d5':'#e9f1ec' }}>
            <Icon name={item.icon} size={24} color={item.s==='panic'?RED:G} />
            <div style={{ fontSize:13, fontWeight:600, marginTop:9 }}>{item.label}</div>
          </button>
        ))}
      </div>
      <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>Announcements</div>
      {[{tag:'NOTICE',title:'Water interruption notice',body:'Mains supply off Saturday 21 June 8AM–4PM for pipe maintenance.',time:'2h ago'},{tag:'INFO',title:'Estate clean-up exercise',body:"Residents should tidy their surroundings ahead of next week's inspection.",time:'1d ago'}].map((a,i) => (
        <div key={i} style={{ background:CARD2, border:`1px solid ${BORDER}`, borderRadius:14, padding:14, marginBottom:10 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
            <div style={{ fontSize:13, fontWeight:600 }}>{a.title}</div>
            <Badge text={a.tag} color={a.tag==='NOTICE'?'#ffb84d':'#7fb4ff'} bg={a.tag==='NOTICE'?'rgba(255,184,77,.12)':'rgba(127,180,255,.12)'} />
          </div>
          <div style={{ fontSize:13, lineHeight:1.5, color:MUTED }}>{a.body}</div>
          <div style={{ fontSize:11, color:DIM, marginTop:8 }}>{a.time}</div>
        </div>
      ))}
    </div>
  );
}

function ResidentGuests({ flash, data, setData }) {
  const [name, setName] = useState('');
  const [type, setType] = useState('single');
  const create = () => {
    const n = name.trim() || 'Guest';
    const code = 'PK-' + Math.random().toString(36).slice(2,6).toUpperCase();
    setData(d => ({ ...d, invites:[{ id:Date.now(), name:n, type, code, when:'Just now' }, ...d.invites] }));
    setName(''); flash('Invite ' + code + ' created');
  };
  const revoke = id => { setData(d => ({ ...d, invites:d.invites.filter(i=>i.id!==id) })); flash('Invitation revoked'); };
  const seg = on => on ? { border:'rgba(52,224,138,.4)', bg:'rgba(52,224,138,.14)', color:G } : { border:'rgba(255,255,255,.1)', bg:'transparent', color:MUTED };
  return (
    <div className="slide" style={{ padding:'0 18px 100px' }}>
      <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:16, padding:14, marginBottom:18 }}>
        <div style={{ fontSize:12, color:DIM, marginBottom:8 }}>Guest or vendor name</div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Kwame from Lagos" style={{ width:'100%', background:INPUT, border:'1px solid rgba(255,255,255,.1)', borderRadius:10, padding:12, color:'#e9f1ec', fontSize:14, outline:'none', marginBottom:12 }} />
        <div style={{ display:'flex', gap:8, marginBottom:14 }}>
          {[{l:'Single use',v:'single'},{l:'Multi-use',v:'multi'}].map(s => {
            const st = seg(type===s.v);
            return <button key={s.v} onClick={()=>setType(s.v)} style={{ flex:1, padding:10, borderRadius:9, cursor:'pointer', fontSize:13, fontWeight:600, border:`1px solid ${st.border}`, background:st.bg, color:st.color }}>{s.l}</button>;
          })}
        </div>
        <button onClick={create} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:11, padding:13, fontWeight:600, fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:7 }}>
          <Icon name="qr_code_2" size={19} color="#06140d" /> Generate invite code
        </button>
      </div>
      <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>Active invitations ({data.invites.length})</div>
      {data.invites.length===0 ? <EmptyState icon="qr_code_2" text="No active invitations" /> : data.invites.map(iv => (
        <div key={iv.id} style={{ display:'flex', alignItems:'center', gap:11, background:CARD, border:`1px solid ${BORDER}`, borderRadius:13, padding:13, marginBottom:9 }}>
          <div style={{ width:36, height:36, borderRadius:10, background:'#1e3327', display:'grid', placeItems:'center' }}><Icon name="confirmation_number" size={19} color="#7ff0b6" /></div>
          <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{iv.name}</div><div style={{ fontSize:11, color:DIM }}>{iv.type==='multi'?'Multi-use':'Single-use'} · {iv.when}</div></div>
          <span style={{ fontFamily:"'Space Grotesk'", fontSize:13, fontWeight:700, color:G, letterSpacing:'.04em', marginRight:8 }}>{iv.code}</span>
          <button onClick={()=>revoke(iv.id)} style={{ background:'none', border:'none', cursor:'pointer', color:DIM, padding:4 }}><Icon name="close" size={18} /></button>
        </div>
      ))}
    </div>
  );
}

function ResidentDues({ flash }) {
  const [paid, setPaid] = useState(false);
  return (
    <div className="slide" style={{ padding:'0 18px 100px' }}>
      {!paid ? (
        <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.2)', borderRadius:18, padding:20, marginBottom:18 }}>
          <div style={{ fontSize:12, color:'#8fd9b3', marginBottom:6 }}>OUTSTANDING BALANCE</div>
          <div style={{ fontFamily:"'Space Grotesk'", fontSize:38, fontWeight:700 }}>₦145,000</div>
          <div style={{ fontSize:13, color:MUTED, marginBottom:18 }}>Due 30 June 2026 · Q2 2026</div>
          <button onClick={()=>{setPaid(true);flash('Payment of ₦145,000 confirmed');}} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:11, padding:14, fontWeight:600, fontSize:15, cursor:'pointer' }}>Pay now · ₦145,000</button>
        </div>
      ) : (
        <div style={{ background:'#123a28', border:'1px solid rgba(52,224,138,.3)', borderRadius:18, padding:24, marginBottom:18, textAlign:'center' }}>
          <div style={{ width:56, height:56, borderRadius:'50%', background:G, display:'grid', placeItems:'center', margin:'0 auto 12px' }}><Icon name="check" size={32} color="#06140d" /></div>
          <div style={{ fontFamily:"'Space Grotesk'", fontSize:19, fontWeight:600 }}>All dues paid</div>
          <div style={{ fontSize:13, color:MUTED, marginTop:4 }}>Receipt sent to your email</div>
        </div>
      )}
      <div style={{ fontSize:13, fontWeight:600, marginBottom:10 }}>Breakdown — Q2 2026</div>
      {[['Security levy','₦60,000'],['Waste management','₦25,000'],['Estate maintenance','₦45,000'],['Generator diesel','₦15,000']].map(([l,a],i) => (
        <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'13px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
          <span style={{ fontSize:14, color:'#cfe0d6' }}>{l}</span><span style={{ fontSize:14, fontWeight:600 }}>{a}</span>
        </div>
      ))}
      <div style={{ fontSize:13, fontWeight:600, margin:'22px 0 10px' }}>Payment history</div>
      {[['Q1 2026','₦145,000','Mar 28'],['Q4 2025','₦145,000','Dec 30'],['Q3 2025','₦130,000','Sep 29']].map(([q,a,d],i) => (
        <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 0', borderBottom:'1px solid rgba(255,255,255,.05)' }}>
          <div style={{ width:34, height:34, borderRadius:10, background:'#16271e', display:'grid', placeItems:'center' }}><Icon name="receipt" size={18} color={G} /></div>
          <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{q}</div><div style={{ fontSize:11, color:DIM }}>{d}</div></div>
          <div style={{ textAlign:'right' }}><div style={{ fontSize:13, fontWeight:600 }}>{a}</div><Badge text="Paid" color={G} bg="rgba(52,224,138,.12)" /></div>
        </div>
      ))}
    </div>
  );
}

function ResidentCommunity({ flash }) {
  const [votes, setVotes] = useState({});
  const polls = [
    { id:1, q:'Should we extend estate hours from 11PM to midnight?', opts:['Yes, extend','No, keep 11PM'], counts:[38,12] },
    { id:2, q:'Preferred day for monthly clean-up exercise?', opts:['Saturday morning','Sunday morning'], counts:[28,22] },
  ];
  const vote = (pollId, opt) => { if (votes[pollId]!==undefined) return; setVotes(v=>({...v,[pollId]:opt})); flash('Vote recorded'); };
  return (
    <div className="slide" style={{ padding:'0 18px 100px' }}>
      <div style={{ fontSize:13, fontWeight:600, marginBottom:12 }}>Open polls</div>
      {polls.map(p => {
        const voted = votes[p.id]!==undefined;
        const total = p.counts.reduce((a,b)=>a+b,0) + (voted?1:0);
        return (
          <div key={p.id} style={{ background:CARD2, border:`1px solid ${BORDER}`, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ fontSize:14, fontWeight:600, marginBottom:14 }}>{p.q}</div>
            {p.opts.map((opt,i) => {
              const mine = voted && votes[p.id]===i;
              const cnt = p.counts[i]+(mine?1:0);
              const pct = total>0?Math.round(cnt/total*100):0;
              return (
                <div key={i} style={{ marginBottom:10 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                    <span style={{ fontSize:13, color:mine?G:'#cfe0d6' }}>{opt}{mine?' ✓':''}</span>
                    <span style={{ fontSize:12, color:DIM }}>{voted?`${pct}%`:''}</span>
                  </div>
                  <div onClick={()=>vote(p.id,i)} style={{ height:10, background:'#1a3025', borderRadius:5, overflow:'hidden', cursor:voted?'default':'pointer' }}>
                    <div style={{ height:'100%', width:voted?`${pct}%`:'0%', background:mine?G:'#2a4a38', borderRadius:5, transition:'width .4s ease' }} />
                  </div>
                </div>
              );
            })}
            {!voted && <div style={{ fontSize:12, color:DIM, marginTop:6 }}>Tap a bar to vote</div>}
          </div>
        );
      })}
      <div style={{ fontSize:13, fontWeight:600, marginBottom:10, marginTop:8 }}>Announcements</div>
      {[{tag:'NOTICE',title:'Water interruption notice',body:'Mains supply off Saturday 21 June 8AM–4PM.',time:'2h ago'},{tag:'INFO',title:'Estate clean-up exercise',body:'Tidy your surroundings ahead of the inspection.',time:'1d ago'},{tag:'EVENT',title:'AGM — 30 June at 5PM',body:'All residents invited to the annual general meeting.',time:'3d ago'}].map((a,i) => (
        <div key={i} style={{ background:CARD2, border:`1px solid ${BORDER}`, borderRadius:14, padding:14, marginBottom:10 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:5 }}>
            <div style={{ fontSize:13, fontWeight:600 }}>{a.title}</div>
            <Badge text={a.tag} color={a.tag==='NOTICE'?'#ffb84d':a.tag==='EVENT'?G:'#7fb4ff'} bg={a.tag==='NOTICE'?'rgba(255,184,77,.12)':a.tag==='EVENT'?'rgba(52,224,138,.12)':'rgba(127,180,255,.12)'} />
          </div>
          <div style={{ fontSize:13, lineHeight:1.5, color:MUTED }}>{a.body}</div>
          <div style={{ fontSize:11, color:DIM, marginTop:6 }}>{a.time}</div>
        </div>
      ))}
    </div>
  );
}

function ResidentPanic({ flash, setScreen }) {
  const [state, setState] = useState('idle');
  const [pct, setPct] = useState(0);
  const t = useRef(null);
  const start = () => { if(state!=='idle')return; setState('arming'); t.current=setInterval(()=>setPct(p=>{const n=Math.min(100,p+4);if(n>=100){clearInterval(t.current);setState('sent');flash('Security alerted!');}return n;}),32); };
  const cancel = () => { if(state==='arming'){clearInterval(t.current);setState('idle');setPct(0);} };
  const reset  = () => { clearInterval(t.current); setState('idle'); setPct(0); setScreen('home'); };
  useEffect(()=>()=>clearInterval(t.current),[]);
  return (
    <div className="slide" style={{ padding:'0 18px 100px', display:'flex', flexDirection:'column', alignItems:'center', paddingTop:32 }}>
      <div style={{ textAlign:'center', marginBottom:36 }}>
        <div style={{ fontFamily:"'Space Grotesk'", fontSize:22, fontWeight:700, color:state==='sent'?G:RED, marginBottom:8 }}>{state==='sent'?'Security alerted':'Emergency alert'}</div>
        <div style={{ fontSize:14, color:'#aebcb3', maxWidth:260 }}>{state==='sent'?'Security officers have been notified. Stay calm.':'Press and hold the button to alert estate security immediately.'}</div>
      </div>
      <div onMouseDown={start} onMouseUp={cancel} onMouseLeave={cancel} onTouchStart={start} onTouchEnd={cancel}
        style={{ width:210, height:210, borderRadius:'50%', cursor:state==='sent'?'default':'pointer', userSelect:'none', background:`conic-gradient(${state==='sent'?G:RED} ${pct*3.6}deg, rgba(255,93,93,.12) 0deg)`, display:'grid', placeItems:'center', marginBottom:32 }}>
        <div style={{ width:172, height:172, borderRadius:'50%', background:state==='sent'?'#10271b':'#2a1414', border:`1px solid ${state==='sent'?'rgba(52,224,138,.45)':'rgba(255,93,93,.4)'}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:9 }}>
          <Icon name={state==='sent'?'check':'sos'} size={56} color={state==='sent'?G:RED} />
          <span style={{ fontSize:14, fontWeight:600, color:state==='sent'?G:'#ff9a9a' }}>{state==='sent'?'Alert sent':state==='arming'?'Hold…':'Hold'}</span>
        </div>
      </div>
      <div style={{ display:'flex', gap:14, width:'100%', maxWidth:300 }}>
        <button onClick={reset} style={{ flex:1, background:'#16271e', border:`1px solid ${BORDER}`, borderRadius:12, padding:14, fontWeight:600, fontSize:14, cursor:'pointer', color:'#cdebd9' }}>{state==='sent'?'Done':'Cancel'}</button>
        {state==='sent' && <button onClick={()=>flash('Calling 911…')} style={{ flex:1, background:RED, border:'none', borderRadius:12, padding:14, fontWeight:600, fontSize:14, cursor:'pointer', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}><Icon name="call" size={18} color="#fff" /> Call 911</button>}
      </div>
      {state==='idle' && <p style={{ fontSize:12, color:DIM, marginTop:24, textAlign:'center', maxWidth:260 }}>Only use in a genuine emergency. This will immediately notify on-duty security officers.</p>}
    </div>
  );
}

// ─── MANAGER ──────────────────────────────────────────────────────────────────

function ManagerHome({ flash, setScreen, data }) {
  return (
    <div className="slide" style={{ padding:'0 18px 100px' }}>
      <div style={{ background:'linear-gradient(150deg,#123a28,#0d2a1d)', border:'1px solid rgba(52,224,138,.18)', borderRadius:18, padding:16, marginBottom:16 }}>
        <div style={{ fontSize:12, color:'#8fd9b3', fontWeight:500, marginBottom:12 }}>TODAY AT A GLANCE</div>

function ManagerPolls({ flash }) {

  const close  = id => { setPolls(p=>p.map(pl=>pl.id===id?{...pl,closed:true}:pl)); flash('Poll closed'); };
  return (
    <div className="slide" style={{ padding:'0 18px 100px' }}>
      <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:16, padding:14, marginBottom:18 }}>

          <input value={opt2} onChange={e=>setOpt2(e.target.value)} placeholder="Option B" style={{ flex:1, background:INPUT, border:'1px solid rgba(255,255,255,.1)', borderRadius:10, padding:11, color:'#e9f1ec', fontSize:13, outline:'none' }} />
        </div>
        <button onClick={create} style={{ width:'100%', background:G, color:'#06140d', border:'none', borderRadius:10, padding:12, fontWeight:600, fontSize:13, cursor:'pointer' }}>Create poll</button>
      </div>
      {polls.map(p => {
        const total = p.counts.reduce((a,b)=>a+b,0);
        return (
          <div key={p.id} style={{ background:CARD2, border:`1px solid ${BORDER}`, borderRadius:14, padding:14, marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'start', marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:600, flex:1, marginRight:10 }}>{p.q}</div>
              <Badge text={p.closed?'CLOSED':'OPEN'} color={p.closed?DIM:G} bg={p.closed?'rgba(255,255,255,.08)':'rgba(52,224,138,.12)'} />
            </div>
            {p.opts.map((opt,i) => { const pct=total>0?Math.round(p.counts[i]/total*100):0; return (
              <div key={i} style={{ marginBottom:8 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}><span style={{ fontSize:12, color:'#cfe0d6' }}>{opt}</span><span style={{ fontSize:12, color:DIM }}>{pct}% · {p.counts[i]}</span></div>
                <div style={{ height:8, background:'#1a3025', borderRadius:4 }}><div style={{ height:'100%', width:`${pct}%`, background:G, borderRadius:4 }} /></div>
              </div>
            ); })}
            <div style={{ fontSize:11, color:DIM, marginTop:8 }}>{total} votes total</div>
            {!p.closed && <button onClick={()=>close(p.id)} style={{ marginTop:10, background:'none', border:'1px solid rgba(255,255,255,.15)', borderRadius:8, padding:'6px 12px', color:MUTED, fontSize:12, fontWeight:600, cursor:'pointer' }}>Close poll</button>}
          </div>
        );
      })}
    </div>
  );
}

          <div style={{ textAlign:'right' }}><div style={{ fontSize:12, color:DIM }}>{l.time}</div><div style={{ fontSize:10, color:l.dir==='in'?G:MUTED, fontWeight:600 }}>{l.dir==='in'?'IN':'OUT'}</div></div>
        </div>
      ))}
    </div>
  );
}

function SecurityPanic({ flash }) {
  const [state, setState] = useState('idle'); const [pct, setPct] = useState(0); const t = useRef(null);
  const start = () => { if(state!=='idle')return; setState('arming'); t.current=setInterval(()=>setPct(p=>{const n=Math.min(100,p+4);if(n>=100){clearInterval(t.current);setState('sent');flash('SOS sent to all officers!');}return n;}),32); };
  const cancel = () => { if(state==='arming'){clearInterval(t.current);setState('idle');setPct(0);} };
  const reset  = () => { clearInterval(t.current); setState('idle'); setPct(0); };
  useEffect(()=>()=>clearInterval(t.current),[]);
  return (
    <div className="slide" style={{ padding:'0 18px 100px', display:'flex', flexDirection:'column', alignItems:'center', paddingTop:36 }}>
      <div style={{ textAlign:'center', marginBottom:36 }}>
        <div style={{ fontFamily:"'Space Grotesk'", fontSize:22, fontWeight:700, color:state==='sent'?G:RED, marginBottom:8 }}>{state==='sent'?'SOS Sent':'Emergency SOS'}</div>
        <div style={{ fontSize:14, color:'#aebcb3', maxWidth:260 }}>{state==='sent'?'All officers on duty have been alerted.':'Hold the button to raise a full estate emergency alert.'}</div>
      </div>
      <div onMouseDown={start} onMouseUp={cancel} onMouseLeave={cancel} onTouchStart={start} onTouchEnd={cancel}
        style={{ width:210, height:210, borderRadius:'50%', cursor:state==='sent'?'default':'pointer', userSelect:'none', background:`conic-gradient(${state==='sent'?G:RED} ${pct*3.6}deg, rgba(255,93,93,.12) 0deg)`, display:'grid', placeItems:'center', marginBottom:28 }}>
        <div style={{ width:172, height:172, borderRadius:'50%', background:state==='sent'?'#10271b':'#2a1414', border:`1px solid ${state==='sent'?'rgba(52,224,138,.45)':'rgba(255,93,93,.4)'}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:9 }}>
          <Icon name={state==='sent'?'check':'sos'} size={56} color={state==='sent'?G:RED} />
          <span style={{ fontSize:14, fontWeight:600, color:state==='sent'?G:'#ff9a9a' }}>{state==='sent'?'Alert sent':state==='arming'?'Hold…':'Hold'}</span>
        </div>
      </div>
      {state!=='idle' && <button onClick={reset} style={{ background:'#16271e', border:`1px solid ${BORDER}`, borderRadius:11, padding:'11px 28px', fontWeight:600, fontSize:14, cursor:'pointer', color:MUTED }}>{state==='sent'?'Dismiss':'Cancel'}</button>}
      <div style={{ fontSize:13, fontWeight:600, margin:'32px 0 10px', alignSelf:'flex-start' }}>Recent incidents</div>
      {[{type:'Forced entry attempt',time:'Yesterday, 11:34 PM'},{type:'Resident panic alert — Block C',time:'3 days ago'}].map((inc,i) => (
        <div key={i} style={{ display:'flex', alignItems:'center', gap:12, background:CARD2, border:`1px solid ${BORDER}`, borderRadius:12, padding:13, marginBottom:9, width:'100%' }}>
          <div style={{ width:32, height:32, borderRadius:9, background:'rgba(255,93,93,.1)', display:'grid', placeItems:'center' }}><Icon name="warning" size={18} color={RED} /></div>
          <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{inc.type}</div><div style={{ fontSize:11, color:DIM }}>{inc.time}</div></div>
          <Badge text="RESOLVED" color={G} bg="rgba(52,224,138,.12)" />
        </div>
      ))}
    </div>
  );
}

// ─── ROLE SELECTOR ────────────────────────────────────────────────────────────

function RoleSelector({ onSelect }) {
  const roles = [
    { key:'resident', icon:'home', label:'Resident', desc:'View invites, pay dues, vote on polls', color:G },
    { key:'manager', icon:'manage_accounts', label:'Manager', desc:'Manage residents, gate, complaints', color:'#7fb4ff' },
    { key:'security', icon:'shield_person', label:'Security', desc:'Verify codes, log access, SOS', color:'#ffb84d' },
  ];
  return (
    <div className="fadein screen-body" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'32px 24px', gap:14, minHeight:'100%' }}>
      <div style={{ textAlign:'center', marginBottom:8 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, justifyContent:'center', marginBottom:16 }}>
          <div style={{ width:38, height:38, borderRadius:11, background:G, display:'grid', placeItems:'center' }}><Icon name="cottage" size={24} color="#06140d" /></div>
          <span style={{ fontFamily:"'Space Grotesk'", fontWeight:700, fontSize:24 }}>Homekeep</span>
        </div>
        <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600, marginBottom:4 }}>Interactive prototype</div>
        <div style={{ fontSize:14, color:MUTED }}>Choose a role to explore</div>
      </div>
      {roles.map(r => (
        <button key={r.key} onClick={()=>onSelect(r.key)} style={{ width:'100%', maxWidth:380, textAlign:'left', display:'flex', alignItems:'center', gap:14, background:CARD, border:`1px solid ${BORDER}`, borderRadius:16, padding:16, cursor:'pointer', color:'#e9f1ec' }}>
          <div style={{ width:46, height:46, borderRadius:14, background:`${r.color}18`, display:'grid', placeItems:'center', flexShrink:0 }}><Icon name={r.icon} size={26} color={r.color} /></div>
          <div style={{ flex:1 }}><div style={{ fontFamily:"'Space Grotesk'", fontSize:16, fontWeight:600 }}>{r.label}</div><div style={{ fontSize:13, color:MUTED, marginTop:2 }}>{r.desc}</div></div>
          <Icon name="arrow_forward_ios" size={16} color={DIM} />
        </button>
      ))}
      <a href="/landing/" style={{ fontSize:13, color:DIM, textDecoration:'none', marginTop:8, display:'flex', alignItems:'center', gap:5 }}>
        <Icon name="arrow_back" size={15} color={DIM} /> Back to landing page
      </a>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────

const ROLE_NAV = {
  resident: [{ key:'home',icon:'home',label:'Home' },{ key:'guests',icon:'group',label:'Guests' },{ key:'dues',icon:'account_balance_wallet',label:'Dues' },{ key:'community',icon:'how_to_vote',label:'Community' }],
  manager:  [{ key:'home',icon:'home',label:'Home' },{ key:'residents',icon:'group',label:'Residents' },{ key:'gate',icon:'shield',label:'Gate' },{ key:'complaints',icon:'forum',label:'Issues' }],
  security: [{ key:'verify',icon:'qr_code_scanner',label:'Verify' },{ key:'log',icon:'list_alt',label:'Log' },{ key:'panic',icon:'sos',label:'SOS' }],
};

const ROLE_META = {
  resident: { sub:'Parkview Estate · Block C', greeting:'Good evening, Femi' },
  manager:  { sub:'Parkview Estate', greeting:'Good evening, Manager' },
  security: { sub:'Main gate · on duty', greeting:'Security Officer' },
};

const SCREEN_TITLE = { guests:'Invitations', dues:'Facility Dues', community:'Community', panic:'Emergency Alert', residents:'Residents', gate:'Gate Control', complaints:'Complaints', polls:'Polls', verify:'Verify Visitor', log:'Access Log' };

function AppShell({ role, onSwitchRole }) {
  const defaultScreen = role==='security' ? 'verify' : 'home';
  const [screen, setScreen] = useState(defaultScreen);
  const [toast, flash] = useToast();
  const nav = ROLE_NAV[role];
  const meta = ROLE_META[role];
  const isHome = screen === defaultScreen;

  const [resData, setResData] = useState({ invites:[{ id:1,name:'Adebayo Group',type:'multi',code:'PK-7QX2',when:'Today, 2:30 PM' },{ id:2,name:'DHL Courier',type:'single',code:'PK-4MN8',when:'Today, 11:05 AM' }] });
  const [mgrData, setMgrData] = useState({
    gate:[{ id:1,name:'Chinedu Okafor',host:'Block C · Flat 4',time:'just now' },{ id:2,name:'Glovo Rider',host:'Block A · Flat 12',time:'2 min ago' }],
    pending:[{ id:1,name:'Tunde Obi',unit:'Block B, Flat 3',when:'today' }],
    residents:[{ id:10,name:'Mrs. Bello',unit:'Block A, Flat 1' },{ id:11,name:'Emeka Okafor',unit:'Block C, Flat 4' },{ id:12,name:'Amaka Nweke',unit:'Block D, Flat 2' }],
    complaints:[{ id:1,title:'Street light out on Block B walkway',status:'In progress',unit:'Block B, Flat 5',time:'Yesterday' },{ id:2,title:'Refuse not collected on Crescent 2',status:'Resolved',unit:'Block A, Flat 3',time:'2 days ago' },{ id:3,title:'Water pressure very low — Block D',status:'Open',unit:'Block D, Flat 1',time:'3 days ago' }],
  });

  const go = s => setScreen(s);
  const gateActions = { ...mgrData, allow:id=>setMgrData(d=>({...d,gate:d.gate.filter(g=>g.id!==id)})), deny:id=>setMgrData(d=>({...d,gate:d.gate.filter(g=>g.id!==id)})) };

  const renderScreen = () => {
    if (role==='resident') {
      if (screen==='home')      return <ResidentHome flash={flash} setScreen={go} data={resData} />;
      if (screen==='guests')    return <ResidentGuests flash={flash} data={resData} setData={setResData} />;
      if (screen==='dues')      return <ResidentDues flash={flash} />;
      if (screen==='community') return <ResidentCommunity flash={flash} />;
      if (screen==='panic')     return <ResidentPanic flash={flash} setScreen={go} />;
    }
    if (role==='manager') {
      if (screen==='home')       return <ManagerHome flash={flash} setScreen={go} data={gateActions} />;
      if (screen==='residents')  return <ManagerResidents flash={flash} data={mgrData} setData={setMgrData} />;
      if (screen==='gate')       return <ManagerGate flash={flash} data={mgrData} setData={setMgrData} />;
      if (screen==='complaints') return <ManagerComplaints flash={flash} data={mgrData} setData={setMgrData} />;
      if (screen==='polls')      return <ManagerPolls flash={flash} />;
    }
    if (role==='security') {
      if (screen==='verify') return <SecurityVerify flash={flash} />;
      if (screen==='log')    return <SecurityLog />;
      if (screen==='panic')  return <SecurityPanic flash={flash} />;
    }
  };

  return (
    <div className="app-shell">
      {/* Status bar */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 22px 0', fontSize:13, fontWeight:600, color:'#cfe0d6', flexShrink:0, background:BG }}>
        <span>9:41</span>
        <div style={{ display:'flex', gap:5 }}><Icon name="signal_cellular_alt" size={16} /><Icon name="wifi" size={16} /><Icon name="battery_full" size={16} /></div>
      </div>

      {/* Header */}
      {isHome ? (
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 18px 12px', flexShrink:0, background:BG }}>
          <div>
            <div style={{ fontSize:12, color:DIM, fontWeight:500 }}>{meta.sub}</div>
            <div style={{ fontFamily:"'Space Grotesk'", fontSize:20, fontWeight:600 }}>{meta.greeting}</div>
          </div>
          <div style={{ display:'flex', gap:10, alignItems:'center' }}>
            <div style={{ position:'relative', width:38, height:38, borderRadius:'50%', background:'#16271e', display:'grid', placeItems:'center', border:`1px solid ${BORDER}`, cursor:'pointer' }}>
              <Icon name="notifications" size={21} color="#aebcb3" />
              <span style={{ position:'absolute', top:8, right:8, width:7, height:7, borderRadius:'50%', background:RED }} />
            </div>
            <button onClick={onSwitchRole} style={{ background:'#16271e', border:`1px solid ${BORDER}`, borderRadius:10, padding:'6px 11px', cursor:'pointer', color:MUTED, fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}>
              <Icon name="swap_horiz" size={17} color={MUTED} /> Switch
            </button>
          </div>
        </div>
      ) : (
        <div style={{ background:BG, flexShrink:0 }}>
          <ScreenHeader title={SCREEN_TITLE[screen]||''} onBack={()=>go(defaultScreen)} />
        </div>
      )}

      {/* Screen content */}
      <div className="screen-body">
        {renderScreen()}
      </div>

      {/* Bottom nav */}
      <div className="bottom-nav">
        {nav.map(n => (
          <button key={n.key} onClick={()=>go(n.key)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:3, color:screen===n.key?( n.key==='panic'?RED:G ):'#6f8579', fontFamily:'inherit', flex:1, padding:'2px 0' }}>
            <Icon name={n.icon} size={24} fill={screen===n.key?1:0} color={screen===n.key?(n.key==='panic'?RED:G):(n.key==='panic'?'rgba(255,93,93,.45)':'#6f8579')} />
            <span style={{ fontSize:10, fontWeight:500 }}>{n.label}</span>
          </button>
        ))}
      </div>

      <ToastBar msg={toast} />
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function App() {
  const [role, setRole] = useState(null);
  return (
    <div className="app-shell">
      {!role ? <RoleSelector onSelect={setRole} /> : <AppShell role={role} key={role} onSwitchRole={()=>setRole(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
